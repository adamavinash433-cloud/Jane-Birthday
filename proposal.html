<!DOCTYPE html>
<html>
<head>
<title>I Love You Jane ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9acb,#b28dff,#a2d2ff);
background-size:300% 300%;
animation:gradient 8s ease infinite;
color:white;
text-align:center;
overflow:hidden;
padding:20px;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:7vw;
margin-bottom:10px;
}

p{
font-size:5vw;
}

button{
padding:14px 28px;
margin:15px;
border:none;
border-radius:40px;
cursor:pointer;
font-size:5vw;
transition:0.3s;
}

.yes{
background:white;
color:#ff4da6;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.no{
background:#ff4da6;
color:white;
position:relative;
}

button:hover{
transform:scale(1.05);
}

.confetti{
position:fixed;
top:-10px;
font-size:22px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

#yesSection, #noSection{
display:none;
margin-top:25px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* Desktop Fix */
@media (min-width:768px){
h1{font-size:28px;}
p{font-size:18px;}
button{font-size:16px;}
}
</style>

</head>

<body>

<h1>Jane… I Love You ❤️</h1>
<p>Would you like to give us a chance?</p>

<div id="buttons">
<button class="yes" onclick="yesClick()">YES 💖</button>
<button class="no" id="noBtn" onclick="noClick()" onmouseover="moveNo()">NO 🤍</button>
</div>

<!-- YES RESULT -->
<div id="yesSection">
<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" width="220">
<h2>You just made me the happiest person alive 💖✨</h2>
<p>From today… it’s us ❤️</p>
</div>

<!-- NO RESULT -->
<div id="noSection">
<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" style="width:60%;max-width:260px;">
<h2>Oh nooo 😭</h2>
<p>But I’ll still smile… because you matter to me ❤️</p>
</div>

<script>

function yesClick(){

document.getElementById("buttons").style.display="none";
document.getElementById("yesSection").style.display="block";

for(let i=0;i<50;i++){
let conf=document.createElement("div");
conf.className="confetti";
conf.innerHTML="💖";
conf.style.left=Math.random()*100+"vw";
conf.style.animationDuration=(2+Math.random()*2)+"s";
document.body.appendChild(conf);

setTimeout(()=>{conf.remove();},4000);
}

}

function noClick(){

document.getElementById("buttons").style.display="none";
document.getElementById("noSection").style.display="block";

}

function moveNo(){
let btn=document.getElementById("noBtn");
btn.style.position="absolute";
btn.style.left=Math.random()*80+"vw";
btn.style.top=Math.random()*80+"vh";
}

</script>

</body>
</html>
