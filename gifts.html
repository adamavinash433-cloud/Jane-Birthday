<!DOCTYPE html>
<html>
<head>
<title>17 Special Gifts For Jane 🎁</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(135deg,#ffd6e8,#cdb4ff,#a2d2ff);
background-size:300% 300%;
animation:gradient 10s ease infinite;
color:white;
text-align:center;
padding:20px;
overflow:hidden;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h2{
font-size:6vw;
margin-bottom:20px;
}

.box{
font-size:20vw;
cursor:pointer;
transition:0.4s;
}

.box:hover{
transform:scale(1.12) rotate(5deg);
}

.gift{
font-size:22vw;
margin-top:15px;
display:none;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0);}
80%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.message{
margin-top:15px;
font-size:5vw;
max-width:90%;
display:none;
line-height:1.6;
}

.counter{
position:absolute;
top:20px;
right:20px;
font-size:4vw;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:40px;
background:white;
color:#ff4da6;
cursor:pointer;
font-size:5vw;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

/* Desktop Fix */
@media (min-width:768px){
h2{font-size:28px;}
.box{font-size:90px;}
.gift{font-size:110px;}
.message{font-size:18px;}
.counter{font-size:16px;}
button{font-size:16px;}
}
</style>
</head>
<body>

<div class="counter" id="counter">Gift 1 of 17</div>

<h2>Click to Open Your Surprise 🎁</h2>

<div class="box" onclick="openGift()">🎁</div>

<div class="gift" id="giftItem"></div>
<div class="message" id="giftMessage"></div>

<button onclick="nextGift()" id="nextBtn">Next Gift ➡</button>

<script>

let giftIndex = 0;

const gifts = [
{emoji:"💐", text:"Beautiful flowers for the most beautiful girl 🌸"},
{emoji:"🍰", text:"A sweet cake for your sweetest smile 🍰"},
{emoji:"🧁", text:"Cupcakes for every time you made my day better 🧁"},
{emoji:"🍩", text:"Donuts as sweet as you 🍩"},
{emoji:"🍫", text:"Chocolate because life is sweeter with you 🍫"},
{emoji:"🍪", text:"Cookies baked with warm wishes 🍪"},
{emoji:"🍨", text:"Ice cream for cool happy moments 🍨"},
{emoji:"🍕", text:"Pizza party just for you 🍕"},
{emoji:"🍟", text:"Snacks for our future movie nights 🍟"},
{emoji:"🧸", text:"A teddy bear to hug when I’m not there 🧸"},
{emoji:"🤗", text:"A free hug coupon — redeem anytime 🤗"},
{emoji:"🌍", text:"A promise to explore new places and grow together 🌍"},
{emoji:"🕰️", text:"My time — because every moment with you matters 🕰️"},
{emoji:"📖", text:"A story that we can slowly write together, page by page 📖"},
{emoji:"🎨", text:"A future filled with colors, laughter, and little beautiful surprises 🎨"},
{emoji:"💌", text:"A handwritten letter from my heart 💌"},
{emoji:"❤️", text:"And finally… something I’ve been holding quietly — my heart ❤️"}
];

function openGift(){

document.querySelector(".box").style.display="none";

let gift=gifts[giftIndex];

document.getElementById("giftItem").innerHTML=gift.emoji;
document.getElementById("giftItem").style.display="block";

document.getElementById("giftMessage").innerHTML=gift.text;
document.getElementById("giftMessage").style.display="block";

document.getElementById("nextBtn").style.display="inline-block";

createHearts();
}

function nextGift(){
giftIndex++;

if(giftIndex < gifts.length){
document.getElementById("counter").innerHTML="Gift "+(giftIndex+1)+" of 17";
document.querySelector(".box").style.display="block";
document.getElementById("giftItem").style.display="none";
document.getElementById("giftMessage").style.display="none";
document.getElementById("nextBtn").style.display="none";
}else{
window.location.href="cake.html";
}
}

function createHearts(){
for(let i=0;i<30;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(h);

setTimeout(()=>{h.remove();},5000);
}
}

</script>

</body>
</html>
