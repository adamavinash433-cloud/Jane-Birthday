<!DOCTYPE html>
<html>
<head>
<title>Make a Wish 🎂</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ffc3e0,#c8a2ff,#a2d2ff);
background-size:300% 300%;
animation:gradient 8s ease infinite;
color:white;
text-align:center;
overflow:hidden;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h2{
font-size:6vw;
margin-bottom:20px;
}

.cake{
font-size:28vw;
position:relative;
}

.flame{
position:absolute;
top:-18%;
left:50%;
transform:translateX(-50%);
font-size:6vw;
animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
from{opacity:1; transform:translateX(-50%) scale(1);}
to{opacity:0.5; transform:translateX(-50%) scale(0.85);}
}

button{
margin-top:30px;
padding:14px 30px;
border:none;
border-radius:40px;
background:white;
color:#ff4da6;
cursor:pointer;
font-size:5vw;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.message{
margin-top:20px;
font-size:5vw;
display:none;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

/* Desktop Fix */
@media (min-width:768px){
h2{font-size:26px;}
.cake{font-size:120px;}
.flame{font-size:28px;}
button{font-size:16px;}
.message{font-size:18px;}
}
</style>
</head>
<body>

<h2>Make a Wish and Blow the Candle 🎂</h2>

<div class="cake">
🎂
<div class="flame" id="flame">🔥</div>
</div>

<button onclick="blow()">Blow Candle 💨</button>

<div class="message" id="wishMsg">
✨ Your wish is already on its way...  
And maybe... I am part of that wish ❤️
</div>

<script>

function blow(){
document.getElementById("flame").style.display="none";
document.querySelector("button").style.display="none";

createHearts();

setTimeout(()=>{
document.getElementById("wishMsg").style.display="block";
},800);

setTimeout(()=>{
window.location.href="proposal.html";
},3000);
}

function createHearts(){
for(let i=0;i<30;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(h);

setTimeout(()=>{h.remove();},5000);
}
}

</script>

</body>
</html>
