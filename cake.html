<!DOCTYPE html>
<html>
<head>
<title>Make a Wish</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Segoe UI;
background:linear-gradient(135deg,#ffc3e0,#c8a2ff);
color:white;
text-align:center;
}
.cake{
font-size:120px;
position:relative;
}
.flame{
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
font-size:30px;
animation:flicker 0.3s infinite alternate;
}
@keyframes flicker{
from{opacity:1;}
to{opacity:0.4;}
}
button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<h2>Make a Wish and Blow the Candle 🎂</h2>

<div class="cake">
🎂
<div class="flame" id="flame">🔥</div>
</div>

<button onclick="blow()">Blow Candle 💨</button>

<script>
function blow(){
document.getElementById("flame").style.display="none";
setTimeout(()=>{
alert("Your wish will come true ✨");
window.location.href="proposal.html";
},1000);
}
</script>

</body>
</html>
